<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epicenter - Analytics Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="brand-title">
                <h1>Epi<span>center</span></h1>
                <p class="site-details">Analytics Mode | Analyse the data | Wake up to reality</p>
                <p class="last-updated">System Status: Live | Sync: <span id="sync-time">---</span></p>
            </div>
        </div>
        </header>

    <div class="app-container">
        <aside class="side-panel" id="side-panel">
            

            <nav class="side-nav">
                <a href="index.html" class="side-item active">
                    <span class="icon">🏠</span>
                    <span class="link-text">Home</span>
                </a>
                <a href="dashboard.html" class="side-item">
                    <span class="icon">📊</span>
                    <span class="link-text">Dashboard</span>
                </a>
                <button class="side-item" id="view-saved">
                    <span class="icon">🔖</span>
                    <span class="link-text">Saved News</span>
                </button>
                
                <div class="side-divider"></div>
                
                <button class="side-item" id="theme-toggle">
                    <span class="icon">🌓</span>
                    <span class="link-text">Toggle Mode</span>
                </button>
            </nav>
        </aside>

        <main class="main-content">
            <div class="dash-header">
                <h2>Real-Time Analytics</h2>
                <p>Visualizing the global news landscape.</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Total Scanned</h3>
                    <p id="stat-total">0</p>
                </div>
                <div class="stat-card">
                    <h3>Saved by You</h3>
                    <p id="stat-saved">0</p>
                </div>
                <div class="stat-card">
                    <h3>Sync Status</h3>
                    <p style="font-size: 1.2rem; color: #10b981;">Online</p>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="newsChart"></canvas>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
